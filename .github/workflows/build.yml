name: Build Python EXE

on:
  push:
    branches: [ "main" ]  # Se activa al subir cambios a main
  workflow_dispatch:      # Permite ejecutarlo manualmente

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: checkout repo content
      uses: actions/checkout@v4

    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Cambia esto a tu versión de Python

    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: build executable
      run: |
        pyinstaller --onefile --windowed main.py
        # --onefile: Empaqueta todo en un solo .exe
        # --windowed: Evita que se abra una consola (quítalo si es una app de consola)
        # main.py: Asegúrate de que este es el nombre de tu archivo principal

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-executable
        path: dist/main.exe