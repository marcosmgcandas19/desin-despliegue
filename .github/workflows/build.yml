name: Build PySide6 EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Cache para acelerar futuras ejecuciones

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --noconfirm --clean `
        --name "MiAplicacionGrafica" `
        --add-data "venv/Lib/site-packages/PySide6/plugins;PySide6/plugins" `
        main.py
      # Nota: La línea --add-data es a veces necesaria en versiones antiguas, 
      # pero las versiones modernas de PyInstaller suelen detectar PySide6 automáticamente.

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-GUI-App
        path: dist/MiAplicacionGrafica.exe