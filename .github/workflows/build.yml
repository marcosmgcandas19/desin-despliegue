name: Build F1 Race EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --noconfirm --clean `
        --name "CarreraF1" `
        main.py
      # IMPORTANTE: Cambia 'main.py' por el nombre del archivo 
      # que contiene el bloque 'if __name__ == "__main__":'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Carrera-F1-Windows
        path: dist/CarreraF1.exe